<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DCT MINI BOT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("https://files.catbox.moe/7e701h.jpg") no-repeat center/cover;
  overflow: hidden;
}

/* Dark gradient overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.75), rgba(0,0,0,0.55));
}

/* Container */
.container {
  position: relative;
  z-index: 2;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* Card */
.card {
  width: 360px;
  padding: 28px 22px;
  border-radius: 18px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 0 35px rgba(0,255,255,0.25);
  text-align: center;
  animation: fadeIn 1s ease;
}

/* Header */
.card h2 {
  color: #00f2ff;
  margin-bottom: 8px;
  text-shadow: 0 0 12px #00f2ff;
}

.card p {
  color: #ccc;
  font-size: 13px;
  margin-bottom: 6px;
}

/* Input */
.input-box {
  margin-top: 18px;
  display: flex;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

.input-box input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
  background: #e6faff;
  font-size: 14px;
}

.input-box button {
  padding: 12px 16px;
  border: none;
  background: linear-gradient(135deg, #00bfff, #00ffff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.input-box button:hover {
  filter: brightness(1.2);
}

/* Output */
#pair {
  margin-top: 18px;
  color: white;
  font-weight: bold;
  word-break: break-word;
}

#copy {
  cursor: pointer;
  display: inline-block;
  padding: 6px 10px;
  border-radius: 6px;
  background: rgba(0,255,255,0.15);
  transition: 0.3s;
}

#copy:hover {
  background: rgba(0,255,255,0.3);
}

/* Floating glow dots */
.dot {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #00ffff;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh);
    opacity: 0.2;
  }
  100% {
    transform: translateY(-10vh);
    opacity: 1;
  }
}

/* Fade animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Sound button */
.sound-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,191,255,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 0 18px #00f2ff;
  z-index: 10;
  transition: 0.3s;
}

.sound-btn:hover {
  transform: scale(1.1);
}

.sound-btn i {
  color: #fff;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>💓 DCT MINI BOT</h2>
    <p>Created by DCT Dev</p>
    <p>Enter your number with country code</p>

    <div class="input-box">
      <input type="number" id="number" placeholder="9476xxxxxxx">
      <button id="submit">Submit</button>
    </div>

    <div id="pair"></div>
  </div>
</div>

<!-- Sound Button -->
<div class="sound-btn" id="soundBtn">
  <i class="fas fa-volume-mute" id="soundIcon"></i>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
const a = document.getElementById("pair");
const b = document.getElementById("submit");
const c = document.getElementById("number");
const soundBtn = document.getElementById("soundBtn");
const soundIcon = document.getElementById("soundIcon");

/* Copy code */
async function Copy() {
  let obj = document.getElementById("copy");
  await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
  obj.innerText = "COPIED";
  setTimeout(() => location.reload(), 1000);
}

/* Submit */
b.addEventListener("click", async (e) => {
  e.preventDefault();

  if (!c.value) {
    a.innerHTML = "Enter your WhatsApp number";
    return;
  }

  const number = c.value.replace(/[^0-9]/g, "");

  if (number.length < 11) {
    a.innerHTML = "<span style='color:red;'>Invalid Number</span>";
    return;
  }

  c.value = "+" + number;
  a.innerHTML = "Please wait...";

  try {
    let { data } = await axios(`/code?number=${number}`);
    let code = data.code || "Service Unavailable";

    a.innerHTML = `
      <div id="copy" onclick="Copy()">
        CODE: <span style="color:#00ffff;">${code}</span>
      </div>
    `;
  } catch (err) {
    a.innerHTML = "<span style='color:red;'>Error fetching code</span>";
  }
});

/* Sound toggle UI */
soundBtn.addEventListener("click", () => {
  if (soundIcon.classList.contains("fa-volume-mute")) {
    soundIcon.classList.replace("fa-volume-mute", "fa-volume-up");
  } else {
    soundIcon.classList.replace("fa-volume-up", "fa-volume-mute");
  }
});

/* Floating dots */
for (let i = 0; i < 70; i++) {
  const dot = document.createElement("div");
  dot.classList.add("dot");
  dot.style.left = Math.random() * 100 + "vw";
  dot.style.animationDuration = (3 + Math.random() * 5) + "s";
  dot.style.animationDelay = Math.random() * 5 + "s";
  document.body.appendChild(dot);
}
</script>

</body>
</html>
